<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Локация</title>

  <style>
    body {
      margin: 0;
      padding: 10px;
      background: rgba(0, 0, 0, 0);
      color: white;
      font-family: sans-serif;
      font-size: 36px;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      text-align: right;
      box-sizing: border-box;
    }

    #location {
      max-width: 90%;
      background: rgba(0, 0, 136, 0.05);
      font-size: 50px;
    }
  </style>
</head>

<body>
  <div id="location">Определение местоположения...</div>

<script>
const output = document.getElementById("location");

async function showLocation() {

  if (!navigator.geolocation) {
    output.textContent = "Геолокация не поддерживается.";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (position) => {

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      try {
        // ❗ добавляем cache-busting, чтобы Nominatim НЕ кешировал ответ
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&addressdetails=1&_=${Date.now()}`;

        const response = await fetch(url, {
          cache: "no-store"
        });

        const data = await response.json();
        const address = data.address || {};

        const road =
          address.road ||
          address.pedestrian ||
          address.footway ||
          "";

        const house = address.house_number || "";
        const suburb = address.suburb || "";
        const city =
          address.city ||
          address.town ||
          address.village ||
          "";

        const state = address.state || "";
        const country = address.country || "";

        let fullAddress = "";

        if (road) fullAddress += road;
        if (house) fullAddress += ", " + house;
        if (suburb) fullAddress += ", " + suburb;
        if (city) fullAddress += `, ${city}`;
        if (state) fullAddress += `, ${state}`;
        if (country) fullAddress += `, ${country}`;

        output.textContent = fullAddress || "Адрес не найден.";

      } catch (e) {
        output.textContent = "Ошибка получения адреса.";
      }

    },
    (error) => {

      switch (error.code) {
        case error.PERMISSION_DENIED:
          output.textContent = "Доступ к геолокации запрещён.";
          break;
        case error.POSITION_UNAVAILABLE:
          output.textContent = "Местоположение недоступно.";
          break;
        case error.TIMEOUT:
          output.textContent = "Истекло время ожидания.";
          break;
        default:
          output.textContent = "Ошибка геолокации.";
      }

    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,   // ❗ ВАЖНО: запрещает кэш координат
      timeout: 10000
    }
  );
}

// первый запуск сразу
showLocation();

// обновление каждые 30 секунд
setInterval(showLocation, 30000);
</script>

</body>
</html>
